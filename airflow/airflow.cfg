# Airflow Configuration for Spotify Data Platform
# This file contains additional Airflow configurations

[core]
# The home folder for airflow, default is ~/airflow
airflow_home = /opt/airflow

# The folder where your airflow pipelines live
dags_folder = /opt/airflow/dags

# The folder where airflow should store its log files
base_log_folder = /opt/airflow/logs

# Airflow can store logs remotely in AWS S3, Google Cloud Storage or Elastic Search.
remote_logging = False

# Logging level
logging_level = INFO

# Whether to load the examples that ship with Airflow
load_examples = False

# Whether to load the default connections that ship with Airflow
load_default_connections = False

# The executor class that airflow should use. 
executor = CeleryExecutor

# SQL Alchemy connection string to the metadata database.
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@airflow-postgres/spotify-data-platform

# The amount of parallelism as a setting to the executor.
parallelism = 32

# The number of task instances allowed to run concurrently by the scheduler
dag_concurrency = 16

# Are DAGs paused by default at creation
dags_are_paused_at_creation = True

# The maximum number of active DAG runs per DAG
max_active_runs_per_dag = 1

# How long before timing out a python file import
dagbag_import_timeout = 30

# How often (in seconds) to scan the DAGs directory for new files.
dag_dir_list_interval = 300

# How often should stats be printed to the logs
print_stats_interval = 30

# How many seconds to wait between file-parsing loops to prevent the logs from being spammed.
min_file_process_interval = 0

# How many processes CAN be used to parse DAG files
max_threads = 2

[scheduler]
# How often (in seconds) to check for orphaned tasks and SchedulerJobs
orphaned_tasks_check_interval = 300.0

# How often (in seconds) to check for zombie tasks
zombie_task_threshold = 300.0

# Turn on/off scheduler catchup by default
catchup_by_default = False

# The number of seconds to wait between consecutive scheduler health checks
scheduler_health_check_threshold = 30

[webserver]
# The base url of your website as airflow cannot guess what domain or
base_url = http://localhost:8080

# Default DAG view
dag_default_view = graph

# Default timezone to display all timestamps in the UI
default_ui_timezone = UTC

# Expose the configuration file in the web server
expose_config = True

# Number of seconds the webserver waits before killing gunicorn master that doesn't respond
web_server_master_timeout = 120

# Number of workers to refresh at a time
worker_refresh_batch_size = 1

# Number of seconds to wait before refreshing gunicorn workers
worker_refresh_interval = 6000

# The worker class gunicorn should use
worker_class = sync

# Log files for the gunicorn webserver
access_logfile = -
error_logfile = -

# Set to true to turn on authentication
authenticate = False

# Filter the list of dags by owner name (requires authentication to be enabled)
filter_by_owner = False

[celery]
# The app name that will be used by celery
celery_app_name = airflow.providers.celery.executors.celery_executor

# The concurrency that will be used when starting workers with the airflow celery worker command
worker_concurrency = 16

# Celery Flower is a sweet web-based tool for monitoring and administrating Celery clusters
flower_host = 0.0.0.0
flower_port = 5555

# Default queue that tasks get assigned to and that worker listen on.
default_queue = default

# The broker URL for Celery
broker_url = redis://:@redis:6379/0

# The result backend for Celery
result_backend = db+postgresql://airflow:airflow@airflow-postgres/spotify-data-platform

# How many processes CAN be used to parse DAG files
worker_concurrency = 16

[smtp]
# Configuration for sending emails via SMTP
smtp_host = localhost
smtp_starttls = True
smtp_ssl = False
smtp_port = 587
smtp_mail_from = airflow@example.com

[api]
# How to authenticate users of the API
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

[operators]
# The default owner assigned to each new operator, unless provided explicitly or passed via `default_args`
default_owner = farhan

# Make the operators more resilient to temporary failures
default_retries = 2