version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:13
    container_name: spotify_postgres
    environment:
      POSTGRES_DB: spotify_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: spotify_password
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - spotify_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spotify_data"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Redis for caching (optional but useful)
  redis:
    image: redis:6-alpine
    container_name: spotify_redis
    ports:
      - "6379:6379"
    networks:
      - spotify_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Main Application
  spotify_app:
    build: .
    container_name: spotify_app
    environment:
      # Database configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: spotify_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: spotify_password
      DATABASE_URL: postgresql://postgres:spotify_password@postgres:5432/spotify_data
      
      # Application settings
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      DATA_REFRESH_HOURS: 1
      BATCH_SIZE: 1000
      MAX_RETRIES: 3
      
      # Redis (optional)
      REDIS_URL: redis://redis:6379
      
      # Spotify API (will be set via .env file)
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: https://datapotipy.com/callback
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.spotify_cache:/app/.spotify_cache
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spotify_network
    restart: unless-stopped
    command: tail -f /dev/null  # Keep container running for development

  # Analytics Dashboard (for future use)
  streamlit:
    build: .
    container_name: spotify_streamlit
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: spotify_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: spotify_password
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spotify_network
    profiles:
      - analytics
    command: streamlit run data_analytics/dashboard_placeholder.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
    driver: local

networks:
  spotify_network:
    driver: bridge